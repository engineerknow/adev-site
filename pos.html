<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adev- POS System Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .cart-height { height: calc(100vh - 280px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Header / Nav -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i class="fas fa-cash-register fa-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-semibold text-slate-800 leading-tight">SmartPOS - adev Demo</h1>
                <p class="text-xs text-slate-500">สาขาที่ 001 - สาขากรุงเทพฯ</p>
            </div>
        </div>
        <div class="flex items-center gap-4 text-slate-600">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-medium" id="current-time"></p>
                <p class="text-xs">พนักงาน: Admin adev User</p>
            </div>
            <button class="bg-slate-100 p-2 rounded-full hover:bg-slate-200 transition-colors">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Left Side: Products -->
        <section class="flex-1 flex flex-col p-4 md:p-6 overflow-hidden">
            <!-- Search & Filters -->
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search-input" placeholder="ค้นหาชื่อสินค้า หรือสแกนบาร์โค้ด..." 
                           class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div class="flex gap-2 overflow-x-auto pb-1 custom-scroll" id="category-list">
                    <!-- Categories will be injected here -->
                </div>
            </div>

            <!-- Products Display -->
            <div class="flex-1 overflow-y-auto custom-scroll pr-2">
                <div class="product-grid" id="product-display">
                    <!-- Products will be injected here -->
                </div>
            </div>
        </section>

        <!-- Right Side: Cart -->
        <aside class="w-full md:w-[400px] bg-white border-l border-slate-200 flex flex-col shadow-xl">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i class="fas fa-shopping-cart text-blue-600"></i>
                    ตะกร้าสินค้า
                </h2>
                <button onclick="clearCart()" class="text-sm text-red-500 hover:text-red-600 font-medium">ล้างทั้งหมด</button>
            </div>

            <!-- Cart Items -->
            <div class="flex-1 overflow-y-auto cart-height custom-scroll p-4 space-y-3" id="cart-items">
                <!-- Cart items will be injected here -->
                <div class="h-full flex flex-col items-center justify-center text-slate-400 opacity-60">
                    <i class="fas fa-box-open fa-3x mb-3"></i>
                    <p>ยังไม่มีสินค้าในตะกร้า</p>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="p-4 bg-slate-50 border-t border-slate-200 space-y-2">
                <div class="flex justify-between text-slate-600">
                    <span>ยอดรวมสินค้า</span>
                    <span id="subtotal">฿0.00</span>
                </div>
                <div class="flex justify-between text-slate-600">
                    <span>ภาษี (7%)</span>
                    <span id="tax">฿0.00</span>
                </div>
                <div class="flex justify-between text-xl font-bold text-slate-800 pt-2 border-t border-slate-200">
                    <span>ยอดสุทธิ</span>
                    <span id="grand-total" class="text-blue-600">฿0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl mt-4 shadow-lg shadow-blue-200 transition-all flex justify-center items-center gap-2">
                    <i class="fas fa-check-circle"></i>
                    ชำระเงิน
                </button>
            </div>
        </aside>
    </main>

    <!-- Payment Modal -->
    <div id="payment-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden animate-bounce-in">
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-check fa-2x"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">ชำระเงินสำเร็จ!</h3>
                <p class="text-slate-500 mb-6">ระบบบันทึกรายการเรียบร้อยแล้ว</p>
                
                <div class="bg-slate-50 rounded-xl p-4 mb-6 text-left space-y-2 border border-slate-100">
                    <div class="flex justify-between text-sm"><span class="text-slate-500">เลขที่รายการ:</span> <span class="font-medium text-slate-700">#INV-99042</span></div>
                    <div class="flex justify-between text-sm"><span class="text-slate-500">เวลา:</span> <span id="receipt-time" class="font-medium text-slate-700"></span></div>
                    <div class="flex justify-between font-bold text-lg pt-2 border-t border-slate-200 text-slate-800">
                        <span>ยอดรวมทั้งสิ้น:</span> <span id="receipt-total" class="text-blue-600"></span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="closeModal()" class="w-full py-3 bg-slate-100 text-slate-700 font-semibold rounded-xl hover:bg-slate-200 transition-all">ปิด</button>
                    <button onclick="window.print()" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-print"></i> พิมพ์ใบเสร็จ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mock Data
        const categories = ["ทั้งหมด", "กาแฟ", "ชา", "ขนมหวาน", "อาหารทานเล่น"];
        const products = [
            { id: 1, name: "เอสเพรสโซ่ร้อน", price: 55, category: "กาแฟ", icon: "☕" },
            { id: 2, name: "ลาเต้เย็น", price: 65, category: "กาแฟ", icon: "🥤" },
            { id: 3, name: "อเมริกาโน่", price: 60, category: "กาแฟ", icon: "☕" },
            { id: 4, name: "ชาเขียวมัทฉะ", price: 70, category: "ชา", icon: "🍵" },
            { id: 5, name: "ชาไทยเย็น", price: 60, category: "ชา", icon: "🥤" },
            { id: 6, name: "เค้กช็อกโกแลต", price: 85, category: "ขนมหวาน", icon: "🍰" },
            { id: 7, name: "ครัวซองต์เนยสด", price: 45, category: "ขนมหวาน", icon: "🥐" },
            { id: 8, name: "เฟรนช์ฟรายส์", price: 50, category: "อาหารทานเล่น", icon: "🍟" },
            { id: 9, name: "นักเก็ตไก่", price: 65, category: "อาหารทานเล่น", icon: "🍗" },
            { id: 10, name: "มาการอง", price: 120, category: "ขนมหวาน", icon: "🍪" },
        ];

        let cart = [];
        let currentCategory = "ทั้งหมด";

        // Initial Render
        function init() {
            renderCategories();
            renderProducts();
            updateTime();
            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString('th-TH', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', 
                day: '2-digit', month: 'short', year: '2-digit'
            });
        }

        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" 
                        class="px-5 py-2 rounded-full whitespace-nowrap transition-all font-medium text-sm
                        ${currentCategory === cat ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:border-blue-400'}">
                    ${cat}
                </button>
            `).join('');
        }

        function renderProducts() {
            const container = document.getElementById('product-display');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = products.filter(p => {
                const matchesCat = currentCategory === "ทั้งหมด" || p.category === currentCategory;
                const matchesSearch = p.name.toLowerCase().includes(search);
                return matchesCat && matchesSearch;
            });

            container.innerHTML = filtered.map(p => `
                <div onclick="addToCart(${p.id})" 
                     class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-500 cursor-pointer transition-all flex flex-col items-center text-center group">
                    <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">${p.icon}</div>
                    <h3 class="text-sm font-medium text-slate-800 mb-1">${p.name}</h3>
                    <p class="text-blue-600 font-bold">฿${p.price.toFixed(2)}</p>
                </div>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function updateQty(productId, delta) {
            const item = cart.find(p => p.id === productId);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(p => p.id !== productId);
                }
                renderCart();
            }
        }

        function clearCart() {
            cart = [];
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 opacity-60">
                        <i class="fas fa-box-open fa-3x mb-3"></i>
                        <p>ยังไม่มีสินค้าในตะกร้า</p>
                    </div>
                `;
                calculateTotals(0);
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex-1">
                        <h4 class="text-sm font-medium text-slate-800">${item.name}</h4>
                        <p class="text-xs text-slate-500">฿${item.price.toFixed(2)} / ชิ้น</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center bg-slate-100 rounded-lg p-1">
                            <button onclick="updateQty(${item.id}, -1)" class="w-6 h-6 flex items-center justify-center hover:bg-white rounded-md transition-all shadow-sm text-slate-600">
                                <i class="fas fa-minus text-[10px]"></i>
                            </button>
                            <span class="w-8 text-center font-bold text-sm">${item.qty}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="w-6 h-6 flex items-center justify-center hover:bg-white rounded-md transition-all shadow-sm text-slate-600">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                        <div class="w-16 text-right font-semibold text-slate-800">
                            ฿${(item.price * item.qty).toFixed(2)}
                        </div>
                    </div>
                </div>
            `).join('');

            const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            calculateTotals(subtotal);
        }

        function calculateTotals(subtotal) {
            const tax = subtotal * 0.07;
            const total = subtotal + tax;

            document.getElementById('subtotal').innerText = `฿${subtotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('tax').innerText = `฿${tax.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('grand-total').innerText = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function checkout() {
            if (cart.length === 0) return;
            
            const total = document.getElementById('grand-total').innerText;
            document.getElementById('receipt-total').innerText = total;
            document.getElementById('receipt-time').innerText = new Date().toLocaleString('th-TH');
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('payment-modal').style.display = 'none';
            clearCart();
        }

        // Search Input Event
        document.getElementById('search-input').addEventListener('input', renderProducts);

        // Initialize App
        window.onload = init;
    </script>

</body>
</html>
